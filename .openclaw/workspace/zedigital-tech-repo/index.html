    <style>
        @font-face {
            font-family: 'JetBrains Mono';
            font-style: normal;
            font-weight: 400 700;
            font-display: swap;
            src: url(/fonts/jetbrains-mono-variable.woff2) format('woff2');
        }
        @font-face {
            font-family: 'Syncopate';
            font-style: normal;
            font-weight: 400;
            font-display: swap;
            src: url(/fonts/syncopate-400.woff2) format('woff2');
        }
        @font-face {
            font-family: 'Syncopate';
            font-style: normal;
            font-weight: 700;
            font-display: swap;
            src: url(/fonts/syncopate-700.woff2) format('woff2');
        }

        :root {
            --bg: #030303;
            --card-bg: rgba(10, 10, 10, 0.5);
            --text: #f0f0f0; /* Increased contrast */
            --text-muted: rgba(255, 255, 255, 0.7); /* Better muted text */
            --accent: #ff003c;
            --accent-2: #00f3ff;
            --border: rgba(255, 255, 255, 0.15);
            --font-display: 'Syncopate', sans-serif;
            --font-code: 'JetBrains Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-display);
            overflow-x: hidden;
            overflow-y: scroll;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            cursor: crosshair;
            -webkit-font-smoothing: antialiased;
            -webkit-overflow-scrolling: touch;
        }

        #root {
            height: 100%;
            width: 100%;
        }

        /* Hide scrollbar */
        ::-webkit-scrollbar { display: none; }
        * { scrollbar-width: none; }

        ::selection {
            background: rgba(0, 243, 255, 0.3);
        }

        .font-display { font-family: var(--font-display); }
        .font-code { font-family: var(--font-code); }

        /* --- POST PROCESSING & OVERLAYS --- */
        .scanlines {
            position: fixed;
            inset: 0;
            background: linear-gradient(to bottom,
                    rgba(255, 255, 255, 0),
                    rgba(255, 255, 255, 0) 50%,
                    rgba(0, 0, 0, 0.2) 50%,
                    rgba(0, 0, 0, 0.2));
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 10;
        }

        .vignette {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, transparent 40%, #000 120%);
            z-index: 11;
            pointer-events: none;
        }

        .noise {
            position: fixed;
            inset: 0;
            z-index: 12;
            opacity: 0.07;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* --- MINIMAL HUD --- */
        .hud-minimal {
            position: fixed;
            top: 2rem;
            left: 2rem;
            z-index: 20;
            pointer-events: none;
            font-family: var(--font-code);
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }

        .hud-brand {
            padding: 8px 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
        }

        @media (max-width: 768px) {
            .hud-minimal {
                top: 1rem;
                left: 1rem;
                font-size: 9px;
            }
        }

        /* --- 3D SCENE --- */
        .viewport {
            position: fixed;
            inset: 0;
            perspective: 1000px;
            overflow: hidden;
            z-index: 1;
        }

        .world {
            position: absolute;
            top: 50%;
            left: 50%;
            transform-style: preserve-3d;
            will-change: transform;
        }

        .item {
            position: absolute;
            left: 0;
            top: 0;
            backface-visibility: hidden;
            transform-origin: center center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- CARDS & CONTENT --- */
        .card {
            width: 320px;
            height: 460px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            position: relative;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.5), 0 20px 50px rgba(0, 0, 0, 0.5);
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            transform: translate(-50%, -50%);
        }

        @media (hover: hover) {
            .card:hover {
                border-color: var(--accent);
                box-shadow: 0 0 30px rgba(255, 0, 60, 0.2);
                background: rgba(20, 20, 20, 0.8);
                z-index: 100;
            }
        }

        .card::before,
        .card::after {
            content: '';
            position: absolute;
            width: 10px;
            height: 10px;
            border: 1px solid transparent;
            transition: 0.3s;
            pointer-events: none;
        }

        .card::before {
            top: -1px;
            left: -1px;
            border-top-color: var(--text);
            border-left-color: var(--text);
        }

        .card::after {
            bottom: -1px;
            right: -1px;
            border-bottom-color: var(--text);
            border-right-color: var(--text);
        }

        .card:hover::before,
        .card:hover::after {
            width: 100%;
            height: 100%;
            border-color: var(--accent);
        }

        .card-header {
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-id {
            font-family: var(--font-code);
            color: var(--accent);
            font-size: 0.8rem;
        }

        .card h2 {
            font-size: 2.5rem;
            line-height: 0.9;
            margin: 0;
            text-transform: uppercase;
            font-weight: 700;
            color: #fff;
            mix-blend-mode: hard-light;
        }

        .card-body {
            flex: 1;
            font-family: var(--font-code);
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.75); /* Improved contrast */
            line-height: 1.8;
            overflow: hidden;
        }

        .card-footer {
            margin-top: auto;
            font-family: var(--font-code);
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.55); /* Improved contrast */
            display: flex;
            justify-content: space-between;
        }

        /* --- BIG TEXT --- Enhanced visibility */
        .big-text {
            font-size: 12vw;
            font-weight: 800;
            color: transparent;
            -webkit-text-stroke: 2px rgba(255, 255, 255, 0.25);
            text-transform: uppercase;
            white-space: nowrap;
            transform: translate(-50%, -50%);
            pointer-events: none;
            letter-spacing: -0.3rem;
            mix-blend-mode: normal;
        }

        .big-text-hero {
            -webkit-text-stroke: 2px rgba(255, 0, 60, 0.45);
            text-shadow: 3px 0 red, -3px 0 cyan;
        }

        /* --- PARTICLES --- */
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            transform: translate(-50%, -50%);
        }

        /* --- SCROLL PROXY --- */
        .scroll-proxy {
            height: 10000vh;
            position: absolute;
            width: 100%;
            z-index: -1;
        }

        /* --- SCROLL HINT --- */
        .scroll-hint-indicator {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            font-family: var(--font-code);
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            transform: translate(-50%, 0);
            animation: hint-fade 2s ease-in-out infinite;
        }

        @keyframes hint-fade {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        @keyframes bounce-down {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(6px); }
        }

        /* === CONTENT-SPECIFIC ADDITIONS === */

        .card-wide {
            width: 480px;
            height: auto;
            min-height: 500px;
        }

        .tech-tag {
            display: inline-block;
            padding: 2px 8px;
            border: 1px solid rgba(0, 243, 255, 0.3);
            color: var(--accent-2);
            font-family: var(--font-code);
            font-size: 0.6rem;
            text-transform: uppercase;
            margin: 2px;
        }

        .brutal-input {
            width: 100%;
            background: rgba(5, 5, 5, 0.8);
            border: 1px solid var(--border);
            padding: 10px 12px;
            color: var(--text);
            font-family: var(--font-code);
            font-size: 0.75rem;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .brutal-input:focus {
            border-color: var(--accent-2);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.15);
        }

        .brutal-input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .brutal-input.error {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(255, 0, 60, 0.15);
        }

        .brutal-select {
            appearance: none;
            -webkit-appearance: none;
            cursor: pointer;
        }

        .brutal-btn {
            background: rgba(255, 0, 60, 0.1);
            border: 1px solid rgba(255, 0, 60, 0.3);
            color: var(--accent);
            font-family: var(--font-code);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 10px 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brutal-btn:hover {
            background: rgba(255, 0, 60, 0.2);
            border-color: rgba(255, 0, 60, 0.6);
            box-shadow: 0 0 20px rgba(255, 0, 60, 0.2);
        }

        .brutal-btn-cyan {
            background: rgba(0, 243, 255, 0.1);
            border-color: rgba(0, 243, 255, 0.3);
            color: var(--accent-2);
        }

        .brutal-btn-cyan:hover {
            background: rgba(0, 243, 255, 0.2);
            border-color: rgba(0, 243, 255, 0.6);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
        }

        /* Accessibility */
        *:focus { outline: none; }
        *:focus-visible {
            outline: 2px solid var(--accent-2);
            outline-offset: 2px;
        }

        .skip-to-content {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            padding: 12px 24px;
            background: var(--bg);
            border: 2px solid var(--accent-2);
            color: var(--accent-2);
            font-family: var(--font-code);
            font-size: 12px;
            text-transform: uppercase;
            text-decoration: none;
            transition: top 0.3s ease;
        }

        .skip-to-content:focus {
            top: 20px;
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* Mobile */
        @media (max-width: 768px) {
            .scanlines, .noise { display: none; }
            .card {
                width: 300px;
                height: 420px;
                padding: 1.5rem;
                backdrop-filter: blur(4px);
                -webkit-backdrop-filter: blur(4px);
            }
            .card:active {
                border-color: var(--accent);
                box-shadow: 0 0 20px rgba(255, 0, 60, 0.15);
            }
            .card-wide {
                width: 320px;
                min-height: 440px;
            }
            .card h2 {
                font-size: 1.5rem;
            }
            .big-text {
                font-size: 12vw;
            }
            .hud {
                inset: 0.75rem;
                font-size: 8px;
            }
        }

        /* Custom cursor - hide native on desktop */
        @media (min-width: 1024px) and (hover: hover) and (pointer: fine) {
            html, body, * { cursor: none !important; }
            input, textarea, select { cursor: text !important; }
            select { cursor: pointer !important; }
        }

        @media (max-width: 1023px), (hover: none), (pointer: coarse) {
            * { cursor: crosshair !important; }
            a, button, [role="button"], input, select, textarea { cursor: pointer !important; }
        }

        /* --- DOT NAVIGATION --- Enhanced visibility */
        .dot-nav {
            position: fixed;
            right: 2rem;
            top: 50%;
            transform: translateY(-50%);
            z-index: 25;
            display: flex;
            flex-direction: column;
            gap: 20px;
            pointer-events: auto;
            padding: 16px 12px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .dot-nav-item {
            width: 12px;
            height: 12px;
            border: 2px solid rgba(255, 255, 255, 0.4);
            background: transparent;
            cursor: pointer;
            transition: all 0.3s;
            padding: 0;
            position: relative;
        }

        .dot-nav-item:hover {
            border-color: var(--accent-2);
            box-shadow: 0 0 12px rgba(0, 243, 255, 0.4);
            transform: scale(1.2);
        }

        .dot-nav-item.active {
            background: var(--accent-2);
            border-color: var(--accent-2);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.5);
            animation: dot-pulse 2s ease-in-out 3;
        }

        @keyframes dot-pulse {
            0%, 100% { box-shadow: 0 0 15px rgba(0, 243, 255, 0.5); }
            50% { box-shadow: 0 0 25px rgba(0, 243, 255, 0.9), 0 0 40px rgba(0, 243, 255, 0.4); }
        }

        .dot-nav-label {
            position: absolute;
            right: 24px;
            top: 50%;
            transform: translateY(-50%);
            font-family: var(--font-code);
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.8);
            text-transform: uppercase;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.6);
            padding: 4px 8px;
        }

        .dot-nav-item:hover .dot-nav-label {
            opacity: 1;
            transform: translateY(-50%) translateX(-4px);
        }

        @media (max-width: 768px) {
            .dot-nav {
                right: 0.5rem;
                gap: 16px;
                padding: 12px 8px;
            }
            .dot-nav-item {
                width: 14px;
                height: 14px;
            }
            .dot-nav-label {
                display: block;
                right: 28px;
                font-size: 0.55rem;
                opacity: 0;
                transition: opacity 0.2s;
            }
            .dot-nav-item:active .dot-nav-label {
                opacity: 1;
            }
            .scroll-hint-indicator {
                font-size: 0.65rem;
            }
            .scroll-hint-indicator span:last-child::after {
                content: ' (swipe up)';
            }
        }

        /* --- LOADING SCREEN --- */
        #loader {
            position: fixed;
            inset: 0;
            z-index: 9000;
            background: #030303;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: var(--font-code);
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }

        #loader.loaded {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        #loader-text::after {
            content: '';
            animation: dots 1.5s steps(3) infinite;
        }

        @keyframes dots {
            0% { content: ''; }
            33% { content: '.'; }
            66% { content: '..'; }
            100% { content: '...'; }
        }

        #loader-bar {
            width: 120px;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin-top: 16px;
            position: relative;
            overflow: hidden;
        }

        #loader-bar::after {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 30%;
            background: var(--accent);
            animation: loader-scan 1s ease-in-out infinite;
        }

        @keyframes loader-scan {
            0% { left: -30%; }
            100% { left: 100%; }
        }

        .select-none {
            -webkit-user-select: none;
            -moz-user-select: none;
            user-select: none;
        }
    </style>

    <script type="module" src="/index.tsx"></script>
    <script>
        (function() {
            var checks = [
                function() { return !!window.Lenis; },
                function() { return document.fonts.ready; }
            ];
            Promise.all(checks.map(function(c) { return c(); })).then(function() {
                var loader = document.getElementById('loader');
                if (loader) loader.classList.add('loaded');
                setTimeout(function() { if (loader) loader.remove(); }, 700);
            });
        })();
    </script>
